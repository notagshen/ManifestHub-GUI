name: Build Windows Executable

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 Go
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          check-latest: true

      # 安装 Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json # 如果有 lock 文件建议加上

      # 安装 Wails
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # 安装前端依赖 (显式指定工作目录)
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      # 构建应用
      # 注意：wails build 应该在包含 wails.json 的根目录下运行
      - name: Build with Wails
        run: |
          wails build -platform windows/amd64 -o ManifestHub-GUI.exe

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManifestHub-GUI
          path: build/bin/ManifestHub-GUI.exe
          retention-days: 30
      
      # 创建 Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/ManifestHub-GUI.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
